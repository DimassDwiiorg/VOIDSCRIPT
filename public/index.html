<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOIDSCRIPT | Anonymous Blue Brutalism Pad</title>
    <link rel="icon" type="image/png" href="PASTE_LINK_LOGO_LU_DI_SINI?v=4">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background-color: #f0f4f8;
            color: #000000;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        header {
            background-color: #0052ff; 
            color: #ffffff;
            padding: 25px;
            border: 4px solid #000000;
            box-shadow: 8px 8px 0px #000000;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        header p {
            font-size: 0.8rem;
            background: #000;
            padding: 4px 8px;
            font-weight: bold;
        }
        .form-box {
            background: #ffffff;
            border: 4px solid #000000;
            padding: 25px;
            box-shadow: 8px 8px 0px #0052ff;
            margin-bottom: 50px;
        }
        .form-box h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 3px solid #000000;
            background: #fafafa;
            font-size: 1rem;
            resize: none;
            outline: none;
            font-weight: bold;
        }
        textarea:focus {
            background: #eef4ff;
        }
        .btn-brutal {
            margin-top: 15px;
            background: #0052ff;
            color: #ffffff;
            border: 3px solid #000000;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            text-transform: uppercase;
        }
        .btn-brutal:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000000;
        }
        .feed-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
            background: #000000;
            color: #ffffff;
            padding: 5px 10px;
        }
        
        /* Layout Postingan Utama */
        .post-card {
            background: #ffffff;
            border: 4px solid #000000;
            padding: 20px;
            margin-bottom: 35px;
            box-shadow: 8px 8px 0px #000000;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #000;
            padding-bottom: 10px;
        }
        /* PP Anonim Abu-abu */
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #8a99ad;
            border: 2px solid #000000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            flex-direction: column;
        }
        .username {
            font-weight: 900;
            font-size: 1rem;
        }
        .post-time {
            font-size: 0.75rem;
            color: #555;
            margin-top: 2px;
        }
        .post-content {
            font-size: 1.1rem;
            line-height: 1.4;
            font-weight: bold;
            word-break: break-word;
            margin-bottom: 15px;
        }

        /* --- BAGIAN AREA KOMENTAR (Kaku ala Brutalism) --- */
        .comment-section {
            background: #f8fafc;
            border-top: 3px solid #000000;
            padding-top: 15px;
            margin-top: 15px;
        }
        .comment-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .comment-input {
            flex: 1;
            padding: 8px;
            border: 2px solid #000;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .comment-btn {
            background: #000;
            color: #fff;
            border: 2px solid #000;
            padding: 0 15px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .comment-item {
            background: #ffffff;
            border: 2px solid #000;
            padding: 10px;
            box-shadow: 3px 3px 0px #0052ff;
        }
        .comment-user {
            font-size: 0.75rem;
            font-weight: 900;
            margin-bottom: 4px;
            color: #0052ff;
        }
        .comment-text {
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>VOIDSCRIPT</h1>
                <p>ANONYMOUS THREAD</p>
            </div>
            <div style="font-size: 0.8rem; font-weight: bold; text-align: right;">v1.2.0<br>SYS: LIVE</div>
        </header>

        <div class="form-box">
            <h2>Keluarin Aja Kata Kata Mutiara Lu Di Sini :</h2>
            <form id="postForm">
                <textarea id="textContent" placeholder="Tuliskan apa aja keluh kesah lu di sini. Tenang web ini di rancang supaya bisa menyembunyikan pengguna..." required></textarea>
                <button type="submit" class="btn-brutal">Publish Thread &rarr;</button>
            </form>
        </div>

        <div class="feed-title">THE VOID FEEDS</div>
        <div id="feedContainer"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Config Firebase asli milik dimzstore lu kemarin
        const firebaseConfig = {
            apiKey: "AIzaSyBReOgcdc3ifJl757LFmJrX0n7Vf5-E0WA",
            authDomain: "dimzstore-21d40.firebaseapp.com",
            databaseURL: "https://dimzstore-21d40-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "dimzstore-21d40",
            storageBucket: "dimzstore-21d40.firebasestorage.app",
            messagingSenderId: "888836931835",
            appId: "1:888836931835:web:2759e1806566131f96f05e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const postsRef = database.ref('void_threads');

        const form = document.getElementById('postForm');
        const contentInput = document.getElementById('textContent');
        const feedContainer = document.getElementById('feedContainer');

        // --- SISTEM PENGUNCI KODE UNIK PER HP (LOCAL STORAGE) ---
        function getMyUniqueCode() {
            // Cek apakah di HP ini sudah pernah tersimpan kode uniknya
            let savedCode = localStorage.getItem('void_user_code');
            
            // Kalau belum ada (user baru pertama kali buka web)
            if (!savedCode) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let newCode = '';
                for (let i = 0; i < 4; i++) {
                    newCode += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                // Simpan permanen di browser HP ini
                localStorage.setItem('void_user_code', newCode);
                savedCode = newCode;
            }
            return savedCode;
        }

        // Kunci kode unik untuk pemilik HP ini
        const MY_ANON_CODE = getMyUniqueCode();

        // Ambil Data Secara Real-Time
        postsRef.on('value', (snapshot) => {
            feedContainer.innerHTML = '';
            const data = snapshot.val();
            
            if (!data) {
                feedContainer.innerHTML = '<div class="post-card" style="text-align:center; color:#888;">Masih Kosong Nih. Yuk jadi orang pertama yang ngeluh :P</div>';
                return;
            }

            const keys = Object.keys(data).reverse();

            keys.forEach(key => {
                const post = data[key];
                const date = new Date(post.timestamp).toLocaleString('id-ID', { 
                    hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
                });

                let commentsHTML = '';
                if (post.comments) {
                    Object.keys(post.comments).forEach(cKey => {
                        const comment = post.comments[cKey];
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-user">Anonymous (${comment.code})</div>
                                <div class="comment-text">${escapeHTML(comment.text)}</div>
                            </div>
                        `;
                    });
                }

                feedContainer.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="avatar">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <div class="user-info">
                                <span class="username">Anonymous (${post.anonCode})</span>
                                <span class="post-time">[ PUKUL: ${date} ]</span>
                            </div>
                        </div>
                        <p class="post-content">${escapeHTML(post.content)}</p>

                        <div class="comment-section">
                            <div class="comment-box">
                                <input type="text" id="input-${key}" class="comment-input" placeholder="Tulis komentar balasan anonim..." required>
                                <button class="comment-btn" onclick="sendComment('${key}')">KIRIM</button>
                            </div>
                            <div class="comment-list">
                                ${commentsHTML || '<p style="font-size:0.75rem; color:#888; padding:5px;">Belum ada komentar.</p>'}
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        // Kirim postingan baru (Pake kode HP yang udah dikunci)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const content = contentInput.value;
            if (!content.trim()) return;

            postsRef.push({
                anonCode: MY_ANON_CODE, // Kodenya tetep ini terus di HP lu
                content: content,
                timestamp: new Date().toISOString()
            }).then(() => {
                contentInput.value = '';
            });
        });

        // Kirim komentar (Juga pake kode HP yang sama)
        window.sendComment = function(postKey) {
            const inputEl = document.getElementById(`input-${postKey}`);
            const commentText = inputEl.value;

            if (!commentText.trim()) {
                alert("Komentar gak boleh kosong!");
                return;
            }

            database.ref(`void_threads/${postKey}/comments`).push({
                code: MY_ANON_CODE, // Kodenya konsisten sama kayak pas lu bikin thread utama
                text: commentText,
                timestamp: new Date().toISOString()
            }).then(() => {
                inputEl.value = '';
            });
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
